<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agropride Client Map</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
    <style>
        @font-face {
            font-family: 'Rubik Local';
            src: url('Rubik.ttf') format('truetype');
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rubik One Local', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 400;
        }

        #map {
            position: fixed;
            inset: 0;
        }

        .maplibregl-popup {
            z-index: 10000 !important;
            max-width: 320px !important;
        }

        #controls {
            position: fixed;
            top: 1vh;
            left: 1vw;
            z-index: 10001;
            background: #434343;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #dd3a28;
            box-shadow: 0 2px 8px rgba(221, 58, 40, 0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            max-width: calc(100vw - 2vw - 20px);
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            border-radius: 8px;
            border: 1px solid #dd3a28;
            box-sizing: border-box;
            padding-left: 8px;
            gap: 8px;
            height: 48px;
        }

        .search-input-row {
            display: flex;
            align-items: center;
            height: 48px;
            position: relative;
            flex: 1;
        }

        .search-icon {
            height: 18px;
            color: #dd3a28;
            pointer-events: none;
        }

        #search {
            height: 48px;
            width: 100%;
            border: none;
            outline: none;
            font-size: 1rem;
            color: #fff;
            background: transparent;
            border-radius: 8px 0 0 8px;
            padding-right: 44px;
        }

        #search::-webkit-search-cancel-button {
            display: none;
        }

        #search::-ms-clear {
            display: none;
        }

        #search::-moz-search-clear-button {
            display: none;
        }

        #search::-o-search-clear-button {
            display: none;
        }

        #search:focus {
            border-color: #dd3a28;
        }

        #clear-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 48px;
            display: none;
            background: transparent;
            border: none;
            font-size: 24px;
            line-height: 1;
            color: #fff;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            border-radius: 0 8px 8px 0;
        }

        #clear-btn:hover {
            color: #dd3a28;
        }

        .suggestions {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: #434343;
            border: 1px solid #dd3a28;
            box-shadow: 0 6px 20px rgba(221, 58, 40, 0.12);
            border-radius: 8px;
            max-height: 220px;
            overflow: auto;
            z-index: 10002;
            display: none;
        }

        .suggestion-item {
            padding: 10px 12px;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #dd3a28;
            color: #fff;
        }

        .maplibregl-popup-content {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            color: #111827;
            padding: 0;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .maplibregl-popup-close-button {
            font-size: 18px;
            padding: 8px 12px;
            color: #6b7280;
            right: 4px;
            top: 4px;
        }

        .maplibregl-popup-close-button:hover {
            background: transparent;
            color: #111827;
        }

        .popup-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .popup-name {
            font-size: 15px;
            font-weight: 600;
            color: #111827;
            margin: 0 0 4px 0;
            padding-right: 20px;
        }

        .popup-label {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 12px;
            color: white;
        }

        .popup-body {
            padding: 12px 16px;
        }

        .popup-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 8px;
        }

        .popup-row:last-child {
            margin-bottom: 0;
        }

        .popup-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            margin-top: 2px;
            color: #9ca3af;
        }

        .popup-value {
            color: #374151;
            word-break: break-word;
        }

        .popup-value a {
            color: #2563eb;
            text-decoration: none;
        }

        .popup-value a:hover {
            text-decoration: underline;
        }

        .popup-notes {
            font-size: 12px;
            color: #6b7280;
            font-style: italic;
            background: #f3f4f6;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
        }

        .popup-coords {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e5e7eb;
        }


        .filter-wrapper {
            display: flex;
            gap: 8px;
            flex: 1 1 auto;
        }

        .filter-select {
            height: 48px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Rubik', sans-serif;
            color: #fff;
            background: #525252;
            font-weight: 700;
            box-shadow: none;
            appearance: none;
            border: none;
            outline: none;
            padding: 0 18px;
            flex: 1 1 0;
            min-width: 100px;
        }

        .filter-select:focus {
            background: #434343;
            color: #fff;
        }

        .filter-select option {
            color: #fff;
            background: #525252;
            font-family: 'Rubik', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
            padding: 12px 18px;
            border-radius: 10px;
        }

        /* Custom scrollbar for dropdown */
        select.filter-select::-webkit-scrollbar {
            width: 8px;
        }

        select.filter-select::-webkit-scrollbar-thumb {
            background: #dd3a28;
            border-radius: 8px;
        }

        #reset-view-btn {
            flex: 0 0 auto;
            height: 48px;
            padding: 0 16px;
            background: #525252;
            border: 1px solid #dd3a28;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Rubik', sans-serif;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
        }

        #reset-view-btn:hover {
            background: #dd3a28;
            color: #fff;
        }

        #reset-view-btn svg {
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div id="controls">
        <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="7" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <div class="search-input-row">
                <input id="search" type="search" placeholder="Пошук..." autocomplete="on" />
                <button id="clear-btn" aria-label="Clear search">×</button>
                <div id="suggestions" class="suggestions" role="listbox"></div>
            </div>
        </div>
        <div class="filter-wrapper">
            <select id="country-filter" class="filter-select">
                <option value="">Країна</option>
                <option value="Україна">Україна</option>
                <option value="Грузія">Грузія</option>
            </select>
            <select id="oblast-filter" class="filter-select">
                <option value="">Область</option>
                <option value="Вінницька">Вінницька</option>
                <option value="Волинська">Волинська</option>
                <option value="Дніпропетровська">Дніпропетровська</option>
                <option value="Донецька">Донецька</option>
                <option value="Житомирська">Житомирська</option>
                <option value="Закарпатська">Закарпатська</option>
                <option value="Запорізька">Запорізька</option>
                <option value="Івано-Франківська">Івано-Франківська</option>
                <option value="Київська">Київська</option>
                <option value="Кіровоградська">Кіровоградська</option>
                <option value="Луганська">Луганська</option>
                <option value="Львівська">Львівська</option>
                <option value="Миколаївська">Миколаївська</option>
                <option value="Одеська">Одеська</option>
                <option value="Полтавська">Полтавська</option>
                <option value="Рівненська">Рівненська</option>
                <option value="Сумська">Сумська</option>
                <option value="Тернопільська">Тернопільська</option>
                <option value="Харківська">Харківська</option>
                <option value="Херсонська">Херсонська</option>
                <option value="Хмельницька">Хмельницька</option>
                <option value="Черкаська">Черкаська</option>
                <option value="Чернівецька">Чернівецька</option>
                <option value="Чернігівська">Чернігівська</option>
                <option value="м.Київ">м.Київ</option>
                <option value="м.Севастополь">м.Севастополь</option>
                <option value="АР Крим">АР Крим</option>
            </select>
        </div>
        <button id="reset-view-btn" title="Скинути вигляд">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
            </svg>
            Скинути
        </button>
    </div>
    <div id="map"></div>
    <script>
        fetch('clients.json')
            .then(r => r.json())
            .then(clients => {


                function clientsToGeoJSON(list) {
                    return {
                        type: 'FeatureCollection',
                        features: list
                            .filter(function (c) { return c.lat != null && c.lng != null; })
                            .map(function (c, i) {
                                return {
                                    type: 'Feature',
                                    geometry: {
                                        type: 'Point',
                                        coordinates: [c.lng, c.lat]
                                    },
                                    properties: {
                                        _index: i,
                                        name: c.name || '',
                                        color: c.color || '#ef4444',
                                        phone: c.phone || '',
                                        email: c.email || '',
                                        contact: c.contact || '',
                                        address: c.address || '',
                                        notes: c.notes || '',
                                        label: c.label || '',
                                        orgTitle: c.orgTitle || ''
                                    }
                                };
                            })
                    };
                }

                function buildPopupHTML(clientsAtLocation) {
                    var html = '<div style="max-height:300px; overflow-y:auto;">';

                    clientsAtLocation.forEach(function (c, index) {
                        html += '<div' + (index > 0 ? ' style="border-top: 1px solid #efefef; padding-top: 12px; margin-top: 12px;"' : '') + '>';

                        html += '<div class="popup-header">';
                        var headerText = clientsAtLocation.length > 1 ? '(' + (index + 1) + ') ' + escapeHtml(c.name) : escapeHtml(c.name);
                        html += '<div class="popup-name" style="font-weight:600; font-size:14px; margin-bottom:4px;">' + headerText + '</div>';

                        if (c.label) {
                            html += '<div class="popup-label" style="background-color:' + (c.color || '#ef4444') + '; font-size:10px; padding:2px 6px; border-radius:4px; color:white; display:inline-block; margin-bottom:8px;">' + escapeHtml(c.label) + '</div>';
                        }
                        html += '</div>';

                        html += '<div class="popup-body" style="font-size:13px; color:#374151;">';

                        if (c.address) {
                            html += '<div class="popup-row" style="display:flex; align-items:start; gap:6px; margin-bottom:4px;">' +
                                '<span style="font-weight:500;">&#128205;</span> ' +
                                '<span class="popup-value">' + escapeHtml(c.address) + '</span></div>';
                        }

                        if (c.notes) {
                            html += '<div class="popup-notes" style="background:#f3f4f6; padding:6px; border-radius:4px; margin-top:6px; font-style:italic; font-size:12px;">' + escapeHtml(c.notes) + '</div>';
                        }

                        html += '</div>';
                        html += '</div>';
                    });

                    html += '</div>';
                    return html;
                }

                function escapeHtml(text) {
                    if (!text) return '';
                    var div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                }

                var fullGeoJSON = clientsToGeoJSON(clients);

                var map = new maplibregl.Map({
                    container: 'map',
                    style: {
                        version: 8,
                        glyphs: 'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
                        sources: {
                            osm: {
                                type: 'raster',
                                tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                                tileSize: 256,
                                attribution: '&copy; OpenStreetMap contributors'
                            }
                        },
                        layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
                    },
                    center: [30.5241361, 50.4500336],
                    zoom: 5
                });

                map.on('load', function () {
                    if (clients.length === 0) return;

                    map.addSource('clients', {
                        type: 'geojson',
                        data: fullGeoJSON
                    });

                    map.addLayer({
                        id: 'unclustered-point',
                        type: 'circle',
                        source: 'clients',
                        paint: {
                            'circle-color': '#ef4444',
                            'circle-radius': 8,
                            'circle-stroke-width': 2,
                            'circle-stroke-color': '#ffffff'
                        }
                    });


                    map.on('click', 'unclustered-point', function (e) {
                        var feature = e.features[0];
                        var coords = feature.geometry.coordinates.slice();
                        var props = feature.properties;

                        var colocated = clients.filter(function (c) {
                            return c.lat != null && c.lng != null &&
                                c.lat.toFixed(6) === coords[1].toFixed(6) &&
                                c.lng.toFixed(6) === coords[0].toFixed(6);
                        });

                        var popupClients = colocated.length > 0 ? colocated : [{
                            name: props.name,
                            color: props.color,
                            phone: props.phone,
                            email: props.email,
                            contact: props.contact,
                            address: props.address,
                            notes: props.notes,
                            label: props.label,
                            orgTitle: props.orgTitle
                        }];

                        while (Math.abs(e.lngLat.lng - coords[0]) > 180) {
                            coords[0] += e.lngLat.lng > coords[0] ? 360 : -360;
                        }

                        new maplibregl.Popup({ maxWidth: '320px' })
                            .setLngLat(coords)
                            .setHTML(buildPopupHTML(popupClients))
                            .addTo(map);
                    });

                    map.on('mouseenter', 'unclustered-point', function () {
                        map.getCanvas().style.cursor = 'pointer';
                    });
                    map.on('mouseleave', 'unclustered-point', function () {
                        map.getCanvas().style.cursor = '';
                    });

                    var bounds = new maplibregl.LngLatBounds();
                    clients.forEach(function (c) {
                        if (c.lat != null && c.lng != null) {
                            bounds.extend([c.lng, c.lat]);
                        }
                    });
                    if (!bounds.isEmpty()) {
                        map.fitBounds(bounds, { padding: 50, maxZoom: 12 });
                    }

                    document.getElementById('reset-view-btn').addEventListener('click', function () {
                        // Restore all markers
                        map.getSource('clients').setData(fullGeoJSON);

                        // Clear search
                        searchInput.value = '';
                        clearBtn.style.display = 'none';
                        suggestionsBox.style.display = 'none';

                        // Reset filters
                        countryFilter.value = '';
                        oblastFilter.value = '';
                        oblastFilter.style.display = '';

                        // Reset map view
                        if (!bounds.isEmpty()) {
                            map.fitBounds(bounds, { padding: 50, maxZoom: 12, duration: 800 });
                        }
                    });

                    var searchInput = document.getElementById('search');
                    var searchInputWrapper = document.querySelector('.search-wrapper');
                    var suggestionsBox = document.getElementById('suggestions');
                    var clearBtn = document.getElementById('clear-btn');
                    var debounceTimer = null;

                    var countryFilter = document.getElementById('country-filter');
                    var oblastFilter = document.getElementById('oblast-filter');
                    function matchesCountry(c, country) {
                        if (!country) return true;
                        if (country === 'Грузія') {
                            return c.address && (c.address.includes('Georgia') || c.address.includes('Грузія'));
                        }
                        if (country === 'Україна') {
                            return !c.address || (!c.address.includes('Georgia') && !c.address.includes('Грузія'));
                        }
                        return c.address && c.address.includes(country);
                    }

                    function filterMapByQuery(q) {
                        var country = countryFilter.value;
                        var oblast = oblastFilter.value;
                        var filtered = clients.filter(function (c) {
                            var countryMatch = matchesCountry(c, country);
                            var oblastMatch = !oblast || (c.address && c.address.includes(oblast + ' обл.'));
                            return countryMatch && oblastMatch;
                        });

                        if (q && q.trim()) {
                            var ql = q.trim().toLowerCase();
                            filtered = filtered.filter(function (c) {
                                var text = [c.name, c.address, c.contact, c.phone]
                                    .filter(Boolean)
                                    .join(' ')
                                    .toLowerCase();
                                return text.indexOf(ql) !== -1;
                            });
                        }
                        map.getSource('clients').setData(clientsToGeoJSON(filtered));
                    }

                    function showSuggestions(q) {
                        var ql = (q || '').trim().toLowerCase();
                        suggestionsBox.innerHTML = '';

                        if (!ql) {
                            suggestionsBox.style.display = 'none';
                            return;
                        }

                        var matches = clients.filter(function (c) {
                            var text = [c.name, c.address, c.contact, c.phone]
                                .filter(Boolean)
                                .join(' ')
                                .toLowerCase();
                            return text.indexOf(ql) !== -1;
                        }).slice(0, 10);

                        if (matches.length === 0) {
                            suggestionsBox.style.display = 'none';
                            return;
                        }

                        matches.forEach(function (client) {
                            var div = document.createElement('div');
                            div.className = 'suggestion-item';
                            div.textContent = client.name + (client.address ? ' (' + client.address + ')' : '');

                            div.addEventListener('click', function () {
                                map.getSource('clients').setData(fullGeoJSON);

                                map.flyTo({
                                    center: [client.lng, client.lat],
                                    zoom: Math.max(map.getZoom(), 14),
                                    essential: true
                                });

                                map.once('moveend', function () {
                                    var colocated = clients.filter(function (c) {
                                        return c.lat != null && c.lng != null &&
                                            c.lat.toFixed(6) === client.lat.toFixed(6) &&
                                            c.lng.toFixed(6) === client.lng.toFixed(6);
                                    });

                                    new maplibregl.Popup({ maxWidth: '320px' })
                                        .setLngLat([client.lng, client.lat])
                                        .setHTML(buildPopupHTML(colocated.length > 0 ? colocated : [client]))
                                        .addTo(map);
                                });

                                searchInput.value = client.name;
                                suggestionsBox.style.display = 'none';
                                clearBtn.style.display = 'flex';
                            });

                            suggestionsBox.appendChild(div);
                        });

                        suggestionsBox.style.display = 'block';
                    }

                    searchInput.addEventListener('input', function (e) {
                        var val = e.target.value;
                        clearBtn.style.display = val ? 'block' : 'none';
                        showSuggestions(val);

                        clearTimeout(debounceTimer);
                        debounceTimer = setTimeout(function () {
                            filterMapByQuery(val);
                        }, 200);
                    });

                    clearBtn.addEventListener('click', function () {
                        searchInput.value = '';
                        filterMapByQuery('');
                        suggestionsBox.style.display = 'none';
                        clearBtn.style.display = 'none';
                    });

                    document.addEventListener('click', function (e) {
                        if (!searchInputWrapper.contains(e.target)) {
                            suggestionsBox.style.display = 'none';
                        }
                    });

                    function flyToClients(matchedClients, maxZoom) {
                        if (!matchedClients.length) return;
                        var b = new maplibregl.LngLatBounds();
                        matchedClients.forEach(function (c) {
                            if (c.lat != null && c.lng != null) b.extend([c.lng, c.lat]);
                        });
                        if (!b.isEmpty()) {
                            map.fitBounds(b, { padding: 60, maxZoom: maxZoom || 10, duration: 1200 });
                        }
                    }

                    countryFilter.addEventListener('change', function () {
                        var country = countryFilter.value;

                        // Show/hide oblast control based on country
                        if (country === 'Грузія') {
                            oblastFilter.value = '';
                            oblastFilter.style.display = 'none';
                        } else {
                            oblastFilter.style.display = '';
                        }

                        filterMapByQuery(searchInput.value);

                        // Fly to matching clients
                        var matched = clients.filter(function (c) { return matchesCountry(c, country); });
                        flyToClients(matched, country === 'Грузія' ? 12 : 7);
                    });

                    oblastFilter.addEventListener('change', function () {
                        var oblast = oblastFilter.value;
                        filterMapByQuery(searchInput.value);

                        if (oblast) {
                            var country = countryFilter.value;
                            var matched = clients.filter(function (c) {
                                return matchesCountry(c, country) &&
                                    c.address && c.address.includes(oblast + ' обл.');
                            });
                            flyToClients(matched, 10);
                        }
                    });

                });


            })
            .catch(err => console.error('Failed to load clients:', err));

    </script>
</body>

</html>
